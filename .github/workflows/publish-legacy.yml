name: publish-legacy

# One-time final publish of the OLD `onnxruntime-mlx` PyPI project as a deprecation
# shim that redirects to `onnxruntime-ep-mlx` (see python-legacy/). Pure-Python, so it
# builds on Linux with no cargo/mlx. Run manually (workflow_dispatch), then archive the
# `onnxruntime-mlx` project on PyPI.
#
# ⚠️ SETUP required before the first run: add a PyPI Trusted Publisher on the
#    `onnxruntime-mlx` project pointing at:
#      - Workflow filename : publish-legacy.yml   (this file)
#      - Environment       : pypi                  (the `environment:` below)
#    (The `onnxruntime-ep-mlx` publisher used by publish.yml is separate.)
#    Alternatively, build `python-legacy` locally and `twine upload` with a token.

on:
  workflow_dispatch:

jobs:
  publish-legacy:
    name: Publish onnxruntime-mlx deprecation shim to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build the pure-Python deprecation shim
        run: |
          python -m pip install --upgrade pip build
          python -m build ./python-legacy -o dist
          ls -la dist
          # Sanity: the built dist must be the OLD name (onnxruntime-mlx / onnxruntime_mlx).
          test -n "$(ls dist/onnxruntime_mlx-*-py3-none-any.whl 2>/dev/null)"

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true
