name: publish

# Publishes the onnxruntime-ep-mlx wheel to PyPI via Trusted Publishing (OIDC, no API token).
#
# ⚠️ VERIFY against your PyPI trusted-publisher configuration before the first release:
#   - PyPI project name          : onnxruntime-ep-mlx   (must match [project].name in python/pyproject.toml)
#   - Workflow filename          : publish.yml       (this file)
#   - GitHub environment         : pypi              (the `environment:` on the publish job below)
# If your trusted publisher uses a different project name or environment (or none), update them here.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (macOS arm64)
    runs-on: macos-14
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain (rustup — no third-party action, supply-chain hardening)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      - name: Provide onnx-genai sibling (pure-Rust tracer dependency)
        run: git clone --depth 1 https://github.com/justinchuby/onnx-genai ../onnx-genai

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build the wheel (hatchling; cargo dylib + mlx bundled)
        run: |
          python -m pip install --upgrade pip build
          # hatch_build.py runs `cargo build --release`, bundles the cargo-built
          # libonnxruntime_mlx_ep.dylib + the mlx runtime (install_name_tool relink),
          # and forces a single py3-none-macosx_*_arm64 platform wheel. No CPython
          # ABI is embedded, so one wheel serves 3.12/3.13 and the free-threaded
          # builds alike.
          ORT_INCLUDE_DIR="$ORT_HOME/include" MACOSX_DEPLOYMENT_TARGET=14.0 \
            python -m build --wheel ./python -o wheelhouse
          ls -la wheelhouse

      - name: Audit wheels (abi3audit — no native Python ABI to violate)
        run: |
          python -m pip install --upgrade abi3audit
          # No compiled Python extension ships in the wheel, so abi3audit finds
          # nothing auditable and --strict passes (abi3-clean by construction).
          python -m abi3audit --strict --report wheelhouse/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build-wheels
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no PyPI token. Environment name must match the trusted-publisher config.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Idempotent: lets you safely re-run the whole workflow (e.g. to retry
          # the crates.io job once onnx-runtime-tracer is published) without the
          # already-uploaded PyPI wheel causing a failure.
          skip-existing: true

  publish-crate:
    name: Publish to crates.io
    needs: build-wheels
    runs-on: macos-14
    # The crate is a cdylib that only builds on Apple Silicon (mlx-c + Metal), so
    # `cargo publish`'s verify build must run on macos-14. Token lives in the
    # `crates` environment (secret CRATES_TOKEN).
    environment: crates
    env:
      ORT_VERSION: "1.27.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mlx-c (hard dependency)
        run: brew install mlx-c

      - name: Install Rust toolchain (rustup — no third-party action, supply-chain hardening)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      - name: Provide onnx-genai sibling (pure-Rust tracer path dependency)
        run: git clone --depth 1 https://github.com/justinchuby/onnx-genai ../onnx-genai

      - name: Provision ONNX Runtime ${{ env.ORT_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            | tar xz
          echo "ORT_HOME=$PWD/onnxruntime-osx-arm64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - name: cargo publish
        # `onnx-runtime-tracer` must already be on crates.io (the path is stripped
        # at publish time and resolved from the registry). Until it is published,
        # this step fails cleanly with an unresolved-dependency error.
        run: |
          cd rust
          ORT_INCLUDE_DIR="$ORT_HOME/include" \
            cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

